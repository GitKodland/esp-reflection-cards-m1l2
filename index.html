<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reflexión</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1 class="title">🎮 Reflexión del Desarrollador</h1>

<div id="cards" class="container">

    <div class="card green">
        <div class="icon">✔</div>
        <h2>Esto es lo que he intentado</h2>
        <textarea id="tried" placeholder="Describe lo que te gustaría hacer"></textarea>
    </div>

    <div class="card red">
        <div class="icon">✖</div>
        <h2>Aquí es donde me quedé atascado</h2>
        <textarea id="stuck" placeholder="¿Algo salió mal?"></textarea>
    </div>

    <div class="card blue">
        <div class="icon">⚙</div>
        <h2>Solución</h2>
        <textarea id="solution" placeholder="¿Cómo puedo mejorar el trabajo?"></textarea>
    </div>

</div>

<div class="buttons">
    <button onclick="downloadImage()">📸 Descargar</button>
    <button onclick="generateFeedback()">🤖 Retroalimentación de IA</button>
</div>

<div id="feedback" class="feedback"></div>

<script src="app.js"></script>

</body>
</html>
