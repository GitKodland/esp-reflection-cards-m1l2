<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reflection</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1 class="title">🎮 Developer's Reflection</h1>

<div id="cards" class="container">

    <div class="card green">
        <div class="icon">✔</div>
        <h2>Here's what I've attempted</h2>
        <textarea id="tried" placeholder="Describe what you would like to do"></textarea>
    </div>

    <div class="card red">
        <div class="icon">✖</div>
        <h2>Here's where I got stuck</h2>
        <textarea id="stuck" placeholder="Did something go wrong?"></textarea>
    </div>

    <div class="card blue">
        <div class="icon">⚙</div>
        <h2>Solution</h2>
        <textarea id="solution" placeholder="How can I improve the work?"></textarea>
    </div>

</div>

<div class="buttons">
    <button onclick="downloadImage()">📸 Download</button>
    <button onclick="generateFeedback()">🤖 AI feedback</button>
</div>

<div id="feedback" class="feedback"></div>

<script src="app.js"></script>

</body>
</html>
